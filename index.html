<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ANSHS SakaySalaysay</title>

<!-- React CDN -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Leaflet -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
}

nav {
  display: flex;
  justify-content: center;
  gap: 15px;
  padding-bottom: 15px;
}

nav button {
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  cursor: pointer;
  background: white;
  color: #203a43;
  font-weight: bold;
  transition: 0.3s;
}

nav button:hover {
  transform: scale(1.05);
}

.container {
  padding: 20px;
  max-width: 1000px;
  margin: auto;
}

.card {
  background: white;
  color: black;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.3);
  animation: fadeIn 0.4s ease-in-out;
}

input, select, textarea {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

textarea {
  height: 100px;
}

button.primary {
  background: #203a43;
  color: white;
  padding: 8px 15px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button.danger {
  background: red;
  color: white;
  border: none;
  padding: 5px 10px;
  border-radius: 8px;
  cursor: pointer;
}

#map {
  height: 400px;
  border-radius: 15px;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(10px);}
  to {opacity: 1; transform: translateY(0);}
}
</style>
</head>
<body>

<div id="root"></div>

  <script type="module">
  // Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
  // TODO: Add SDKs for Firebase products that you want to use
  // https://firebase.google.com/docs/web/setup#available-libraries

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyDZUUgvFcgetmmRfUlY0-DYrj3PPRWqMpo",
    authDomain: "sakaysalaysay-9c1d1.firebaseapp.com",
    projectId: "sakaysalaysay-9c1d1",
    storageBucket: "sakaysalaysay-9c1d1.firebasestorage.app",
    messagingSenderId: "118192351425",
    appId: "1:118192351425:web:19cedc542aeef807098c40"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
</script>
<script type="text/babel">

function App() {

  const [tab, setTab] = React.useState("home");
  const [reviews, setReviews] = React.useState(
    JSON.parse(localStorage.getItem("reviews")) || []
  );

  const [form, setForm] = React.useState({
    name: "",
    subject: "",
    route: "",
    transit: "Dyip",
    category: "Sobrang Pamasahe",
    message: ""
  });

  React.useEffect(() => {
    localStorage.setItem("reviews", JSON.stringify(reviews));
  }, [reviews]);

  React.useEffect(() => {
    if(tab === "map") initMap();
  }, [tab]);

  function handleSubmit() {
    if(!form.name || !form.subject || !form.route || !form.message){
      alert("Pakipunan lahat ng field.");
      return;
    }
    setReviews([...reviews, form]);
    setForm({
      name: "",
      subject: "",
      route: "",
      transit: "Dyip",
      category: "Sobrang Pamasahe",
      message: ""
    });
    setTab("home");
  }

  function deleteReview(index){
    const updated = reviews.filter((_, i) => i !== index);
    setReviews(updated);
  }

  function initMap(){
    if(window.myMap) return;

    window.myMap = L.map('map').setView([6.128,125.29], 13);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png')
      .addTo(window.myMap);

    // Dyip Route
    L.polyline([
      [6.128,125.29],
      [6.120,125.280],
      [6.116,125.171]
    ], {color: 'blue'}).addTo(window.myMap)
      .bindPopup("Dyip Route: ANSHS - KCC");

    // Multicab Route
    L.polyline([
      [6.128,125.29],
      [6.110,125.285],
      [6.100,125.286]
    ], {color: 'green'}).addTo(window.myMap)
      .bindPopup("Multicab Route: ANSHS - Alabel Terminal");

    L.marker([6.128,125.29]).addTo(window.myMap)
      .bindPopup("Alabel National Science High School");

    L.marker([6.116,125.171]).addTo(window.myMap)
      .bindPopup("KCC Terminal - GenSan");

    L.marker([6.100,125.286]).addTo(window.myMap)
      .bindPopup("Alabel Terminal");
  }

  return (
    <div>
      <header>ANSHS SakaySalaysay</header>

      <nav>
        <button onClick={()=>setTab("home")}>Home</button>
        <button onClick={()=>setTab("write")}>Write Review</button>
        <button onClick={()=>setTab("profile")}>Profile</button>
        <button onClick={()=>setTab("map")}>Map</button>
      </nav>

      <div className="container">

        {tab === "home" && (
          <>
            <h2>Mga Review</h2>
            {reviews.map((r,i)=>(
              <div key={i} className="card">
                <strong>{r.subject}</strong>
                <p><small>{r.name} | {r.route} | {r.transit} | {r.category}</small></p>
                <p>{r.message}</p>
                <button className="danger" onClick={()=>deleteReview(i)}>Delete</button>
              </div>
            ))}
          </>
        )}

        {tab === "write" && (
          <div className="card">
            <h2>Gumawa ng Review</h2>
            <input placeholder="Pangalan"
              value={form.name}
              onChange={e=>setForm({...form,name:e.target.value})}/>
            <input placeholder="Subject"
              value={form.subject}
              onChange={e=>setForm({...form,subject:e.target.value})}/>
            <input placeholder="Mula - Papunta"
              value={form.route}
              onChange={e=>setForm({...form,route:e.target.value})}/>
            <select value={form.transit}
              onChange={e=>setForm({...form,transit:e.target.value})}>
              <option>Dyip</option>
              <option>Multicab</option>
            </select>
            <select value={form.category}
              onChange={e=>setForm({...form,category:e.target.value})}>
              <option>Sobrang Pamasahe</option>
              <option>Siksikan</option>
              <option>Nakaharang na Gulong</option>
              <option>Bilis ng Pagmamaneho</option>
              <option>Iba pa</option>
            </select>
            <textarea placeholder="Ilagay ang karanasan..."
              value={form.message}
              onChange={e=>setForm({...form,message:e.target.value})}/>
            <button className="primary" onClick={handleSubmit}>
              Send
            </button>
          </div>
        )}

        {tab === "profile" && (
          <div className="card">
            <h2>User Profile</h2>
            <p><strong>Total Reviews:</strong> {reviews.length}</p>
          </div>
        )}

        {tab === "map" && (
          <div id="map"></div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>

</body>

</html>
